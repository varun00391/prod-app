name: Build and Deploy to Azure Container Apps

on:
  push:
    branches: [main, master]

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'chatgpt-app-rg' }}
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  CONTAINER_APP_BACKEND: ${{ vars.CONTAINER_APP_BACKEND || 'chatgpt-app-backend' }}
  CONTAINER_APP_FRONTEND: ${{ vars.CONTAINER_APP_FRONTEND || 'chatgpt-app-frontend' }}
  BACKEND_URL: ${{ vars.BACKEND_URL }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'chatgpt-app' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          if [ -z "$ACR_LOGIN_SERVER" ]; then
            echo "::error::ACR_LOGIN_SERVER is not set. Add it in Settings → Secrets and variables → Actions → Variables. Value = your ACR login server from the setup script output (e.g. chatgptappacr35db3d88.azurecr.io)"
            exit 1
          fi
          SERVER="${ACR_LOGIN_SERVER#https://}"
          SERVER="${SERVER#http://}"
          ACR_NAME="${SERVER%.azurecr.io}"
          if [ -z "$ACR_NAME" ] || [ "$ACR_NAME" = "$SERVER" ]; then
            echo "::error::ACR_LOGIN_SERVER must be the ACR login server ending in .azurecr.io (e.g. chatgptappacr35db3d88.azurecr.io). Current value: '$ACR_LOGIN_SERVER'"
            exit 1
          fi
          az acr login --name "$ACR_NAME"
        env:
          ACR_LOGIN_SERVER: ${{ env.ACR_LOGIN_SERVER }}

      - name: Build and push Backend
        run: |
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.PROJECT_NAME }}-backend:${{ github.sha }} -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.PROJECT_NAME }}-backend:latest ./backend
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.PROJECT_NAME }}-backend:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.PROJECT_NAME }}-backend:latest

      - name: Build and push Frontend
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "::error::BACKEND_URL is not set. Add it in Settings → Secrets and variables → Actions → Variables. Value = backend app URL (e.g. https://chatgpt-app-backend.xxx.eastus.azurecontainerapps.io)"
            exit 1
          fi
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.PROJECT_NAME }}-frontend:${{ github.sha }} -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.PROJECT_NAME }}-frontend:latest \
            --build-arg NEXT_PUBLIC_API_URL=${{ env.BACKEND_URL }} \
            ./frontend
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.PROJECT_NAME }}-frontend:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.PROJECT_NAME }}-frontend:latest
        env:
          BACKEND_URL: ${{ env.BACKEND_URL }}

      - name: Configure MongoDB Atlas for backend (optional)
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          if [ -z "$MONGODB_URI" ]; then
            echo "MONGODB_URI secret not set; skipping MongoDB Atlas configuration."
            exit 0
          fi
          az containerapp secret set \
            --name "${{ env.CONTAINER_APP_BACKEND }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --secrets "mongodb-uri=$MONGODB_URI" \
            --output none
          az containerapp update \
            --name "${{ env.CONTAINER_APP_BACKEND }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --set-env-vars "MONGODB_URI=secretref:mongodb-uri" \
            --output none

      - name: Deploy Backend to Container Apps
        run: |
          SERVER="${{ env.ACR_LOGIN_SERVER }}"
          ACR_NAME="${SERVER%.azurecr.io}"
          ACR_USER=$(az acr credential show --name "$ACR_NAME" --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query username -o tsv)
          ACR_PASS=$(az acr credential show --name "$ACR_NAME" --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "passwords[0].value" -o tsv)
          az containerapp registry set \
            --name ${{ env.CONTAINER_APP_BACKEND }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --server "$SERVER" \
            --username "$ACR_USER" \
            --password "$ACR_PASS"
          az containerapp ingress update \
            --name ${{ env.CONTAINER_APP_BACKEND }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --target-port 8000
          az containerapp update \
            --name ${{ env.CONTAINER_APP_BACKEND }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/${{ env.PROJECT_NAME }}-backend:latest

      - name: Deploy Frontend to Container Apps
        run: |
          SERVER="${{ env.ACR_LOGIN_SERVER }}"
          ACR_NAME="${SERVER%.azurecr.io}"
          ACR_USER=$(az acr credential show --name "$ACR_NAME" --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query username -o tsv)
          ACR_PASS=$(az acr credential show --name "$ACR_NAME" --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" --query "passwords[0].value" -o tsv)
          az containerapp registry set \
            --name ${{ env.CONTAINER_APP_FRONTEND }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --server "$SERVER" \
            --username "$ACR_USER" \
            --password "$ACR_PASS"
          az containerapp ingress update \
            --name ${{ env.CONTAINER_APP_FRONTEND }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --target-port 3000
          az containerapp update \
            --name ${{ env.CONTAINER_APP_FRONTEND }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/${{ env.PROJECT_NAME }}-frontend:latest
